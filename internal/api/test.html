<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bounce - Test Console</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:system-ui,sans-serif;background:#0f0f1a;color:#e0e0e0;padding:20px}
h1{color:#ff6b35;margin-bottom:8px}
.endpoint{background:#1a1a2e;border-radius:8px;padding:16px;margin-bottom:12px}
.endpoint h3{margin-bottom:8px}
.method{display:inline-block;background:#ff6b35;color:#000;padding:2px 8px;border-radius:4px;font-size:12px;font-weight:bold;margin-right:8px}
.url{color:#4fc3f7;font-family:monospace}
input{background:#0a0a15;border:1px solid #333;color:#e0e0e0;padding:8px 12px;border-radius:4px;width:200px;margin-right:8px}
button{background:#ff6b35;color:#000;border:none;padding:8px 16px;border-radius:4px;cursor:pointer;font-weight:bold}
pre{background:#0a0a15;padding:12px;border-radius:4px;margin-top:8px;max-height:300px;overflow:auto;font-size:12px}
</style>
</head>
<body>
<h1>Bounce - Test Console</h1>
<div class="endpoint"><h3><span class="method">GET</span><span class="url">/health</span></h3><button onclick="call('/health')">Test</button><pre id="out-health"></pre></div>
<div class="endpoint"><h3><span class="method">GET</span><span class="url">/api/competitions</span></h3><button onclick="call('/api/competitions')">Test</button><pre id="out-competitions"></pre></div>
<div class="endpoint"><h3><span class="method">GET</span><span class="url">/api/games</span></h3><input id="games-date" placeholder="YYYY-MM-DD" value="2025-06-18"><input id="games-comp" placeholder="competition ID"><button onclick="call('/api/games?'+params(['date','competition']))">Test</button><pre id="out-games"></pre></div>
<div class="endpoint"><h3><span class="method">GET</span><span class="url">/api/standings/{id}</span></h3><input id="standings-comp" placeholder="competition ID"><button onclick="call('/api/standings/'+get('standings-comp'))">Test</button><pre id="out-standings"></pre></div>
<div class="endpoint"><h3><span class="method">GET</span><span class="url">/api/game/{id}</span></h3><input id="game-id" placeholder="internal ID"><button onclick="call('/api/game/'+get('game-id'))">Test</button><pre id="out-game"></pre></div>
<script>
async function call(p){const el=document.getElementById('out-'+p.split('/')[2]?.split('?')[0]||'health');el.textContent='Loading...';try{const r=await fetch(p);const t=await r.text();try{el.textContent=JSON.stringify(JSON.parse(t),null,2)}catch{el.textContent=t}}catch(e){el.textContent='Error: '+e.message}}
function get(id){return document.getElementById(id).value}
function params(ids){const p=[];for(const id of ids){const v=get(id);if(v)p.push(id.replace(/^.+-/,'')+'='+encodeURIComponent(v))}return p.join('&')}
</script>
</body>
</html>
