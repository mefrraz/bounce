<!DOCTYPE html>
<html lang="pt" data-theme="dark">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Bounce · Test</title>
<style>
:root{--accent:#ff6b35;--accent-dim:#e85a2a;--data:#4fc3f7;--bg:#09090b;--card:#18181b;--card-hover:#27272a;--border:rgba(255,255,255,0.1);--border-strong:rgba(255,255,255,0.15);--text:#f4f4f5;--muted:#71717a;--muted2:#52525b;--green:#22c55e;--red:#ef4444}
[data-theme="light"]{--accent:#e85a2a;--data:#0284c7;--bg:#fafafa;--card:#fff;--card-hover:#f4f4f5;--border:rgba(0,0,0,0.08);--border-strong:rgba(0,0,0,0.14);--text:#18181b;--muted:#71717a;--muted2:#a1a1aa;--green:#16a34a;--red:#dc2626}
*{box-sizing:border-box;margin:0;padding:0}
html{scrollbar-gutter:stable}
html,body{background:var(--bg);color:var(--text);font-family:system-ui,-apple-system,sans-serif;min-height:100vh}
nav.topbar{position:sticky;top:0;z-index:50;display:flex;align-items:center;justify-content:space-between;padding:0 24px;height:64px;background:rgba(9,9,11,0.85);backdrop-filter:blur(14px);border-bottom:1px solid var(--border)}
[data-theme="light"] nav.topbar{background:rgba(250,250,250,0.85)}
.brand{display:flex;align-items:center;gap:10px;font-weight:600;font-size:17px}
.brand-mark{width:26px;height:26px;border-radius:8px;background:var(--accent);border:2px dashed rgba(255,255,255,0.3);display:flex;align-items:center;justify-content:center;font-size:10px;color:rgba(255,255,255,0.5)}
.brand span.dim{color:var(--muted);font-weight:500}
.nav-links{display:flex;align-items:center;gap:4px}
.nav-links a{color:var(--muted);text-decoration:none;font-size:13px;font-weight:600;padding:7px 14px;border-radius:8px;transition:all .15s}
.nav-links a:hover{color:var(--text);background:rgba(128,128,128,0.1)}
.nav-links a.active{color:var(--accent);background:rgba(255,107,53,0.1)}
.nav-right{display:flex;align-items:center;gap:8px}
.toggle-btn{background:none;border:none;cursor:pointer;padding:4px;color:var(--muted);border-radius:6px}
.toggle-btn:hover{color:var(--text)}
.toggle-btn svg{display:block}
main{max-width:1180px;margin:0 auto;padding:28px 20px 60px}
.endpoints-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px}
.endpoint-card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:14px;display:flex;flex-direction:column;gap:8px}
.endpoint-card.get{border-left:3px solid var(--data)}
.endpoint-card.ws{border-left:3px solid var(--accent)}
.endpoint-head{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.method-badge{font-size:10px;font-weight:600;padding:2px 7px;border-radius:4px;color:var(--data);background:rgba(79,195,247,0.12)}
.ep-path{font-family:'Courier New',monospace;font-size:12px;font-weight:600;color:var(--text)}
.params-row{display:flex;gap:6px;flex-wrap:wrap}
.param-field{display:flex;flex-direction:column;gap:3px;flex:1 1 120px;min-width:100px}
.param-field label{font-size:10px;font-weight:600;color:var(--muted);text-transform:uppercase}
.param-field input{background:rgba(128,128,128,0.05);border:1px solid var(--border);border-radius:6px;color:var(--text);font-family:'Courier New',monospace;font-size:11px;padding:6px 8px;outline:none}
.param-field input:focus{border-color:var(--accent)}
.ep-actions{display:flex;align-items:center;gap:8px}
.btn{display:inline-flex;align-items:center;gap:4px;border:none;cursor:pointer;font-family:inherit;font-size:11px;font-weight:600;padding:5px 12px;border-radius:6px;transition:all .15s}
.btn-primary{color:#fff;background:var(--accent)}
.btn-primary:hover{background:var(--accent-dim)}
.btn-danger{color:var(--red);background:transparent;border:1px solid rgba(239,68,68,0.3)}
.btn-danger:hover{background:rgba(239,68,68,0.1)}
.btn-ghost{color:var(--text);background:var(--card);border:1px solid var(--border)}
.spinner{width:12px;height:12px;border-radius:50%;border:2px solid rgba(128,128,128,0.15);border-top-color:var(--accent);animation:spin .7s linear infinite;display:none}
.spinner.spinning{display:inline-block}@keyframes spin{to{transform:rotate(360deg)}}
pre.resp-box{background:rgba(0,0,0,0.3);border:1px solid var(--border);border-radius:8px;padding:10px 12px;font-family:'Courier New',monospace;font-size:11px;line-height:1.5;max-height:220px;overflow:auto;white-space:pre-wrap;word-break:break-word;display:none;margin-top:6px}
pre.resp-box.visible{display:block}
pre.resp-box.error{color:var(--red)}
.ws-card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:16px;margin-top:20px}
.ws-controls{display:flex;align-items:flex-end;gap:8px;flex-wrap:wrap;margin-bottom:12px}
.ws-log{background:rgba(0,0,0,0.3);border:1px solid var(--border);border-radius:8px;padding:10px 12px;height:200px;overflow-y:auto;font-family:'Courier New',monospace;font-size:11px;line-height:1.6}
.ws-log-empty{color:var(--muted);text-align:center;padding-top:80px}
.status-ok{color:var(--green);font-size:11px;font-weight:600}
.status-err{color:var(--red);font-size:11px;font-weight:600}
@media(max-width:880px){.endpoints-grid{grid-template-columns:1fr}}
@media(max-width:620px){nav.topbar{padding:0 14px;height:52px}.nav-links a{padding:6px 10px;font-size:12px}.brand span.dim{display:none}main{padding:20px 14px 50px}}
</style>
</head>
<body>
<nav class="topbar">
<div class="brand"><div class="brand-mark" title="Logo placeholder">?</div>Bounce <span class="dim">/ test</span></div>
<div class="nav-links">
<a href="/dashboard">Dashboard</a>
<a href="/docs">API Docs</a>
<a href="/test" class="active">Test</a>
<a href="/metrics">Metrics</a>
</div>
<div class="nav-right">
<button class="toggle-btn" id="themeToggle" title="Light/Dark"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg></button>
</div>
</nav>

<main>
<section class="endpoints-grid" id="grid"></section>
<section class="ws-card">
<div style="font-size:14px;font-weight:600;margin-bottom:12px">WebSocket /ws/game/{id}</div>
<div class="ws-controls">
<div class="param-field" style="flex:0 0 140px"><label>Game ID</label><input id="wsGameId" value="413420"></div>
<button class="btn btn-primary" id="wsConnect">Connect</button>
<button class="btn btn-danger" id="wsDisconnect" disabled>Disconnect</button>
<button class="btn btn-ghost" id="wsClear" style="font-size:10px">Clear</button>
</div>
<div class="ws-log" id="wsLog"><div class="ws-log-empty">Enter Game ID and click Connect</div></div>
</section>
</main>

<script>
var EPS=[{id:'health',path:'/health',p:[]},{id:'competitions',path:'/api/competitions',p:[]},{id:'games',path:'/api/games',p:[{n:'club',v:'119'},{n:'season',v:'2025/2026'}]},{id:'games-today',path:'/api/games/today',p:[]},{id:'games-live',path:'/api/games/live',p:[]},{id:'game',path:'/api/game/{id}',p:[{n:'id',v:'413420'}]},{id:'standings',path:'/api/standings/{id}',p:[{n:'id',v:'10902'}]},{id:'athlete',path:'/api/athlete/{id}',p:[{n:'id',v:'269564'}]},{id:'team',path:'/api/team/{id}',p:[{n:'id',v:'equipa_57682'}]},{id:'club-teams',path:'/api/club/{id}/teams',p:[{n:'id',v:'127'}]},{id:'elo',path:'/api/elo',p:[]},{id:'predictions',path:'/api/predictions/{gameId}',p:[{n:'gameId',v:'413420'}]},{id:'h2h',path:'/api/h2h',p:[{n:'team_a',v:'127'},{n:'team_b',v:'120'}]},{id:'tb-standings',path:'/api/tugabasket/standings',p:[{n:'competitionId',v:'1'}]},{id:'tb-players',path:'/api/tugabasket/players',p:[{n:'competitionId',v:'1'}]},{id:'tb-teams',path:'/api/tugabasket/teams',p:[{n:'competitionId',v:'1'}]},{id:'metrics-hist',path:'/api/metrics/history/simple',p:[{n:'minutes',v:'60'}]}];
var grid=document.getElementById('grid');
EPS.forEach(function(e){
var d=document.createElement('div');d.className='endpoint-card get';
var ph=e.p.map(function(p){return'<div class="param-field"><label>'+p.n+'</label><input id="i-'+e.id+'-'+p.n+'" value="'+p.v+'"></div>'}).join('');
d.innerHTML='<div class="endpoint-head"><span class="method-badge">GET</span><span class="ep-path">'+e.path+'</span></div>'+(ph?'<div class="params-row">'+ph+'</div>':'')+'<div class="ep-actions"><button class="btn btn-primary" data-run="'+e.id+'">Test</button><span class="spinner" id="spin-'+e.id+'"></span><span id="st-'+e.id+'"></span></div><pre class="resp-box" id="resp-'+e.id+'"></pre>';
grid.appendChild(d);
});

async function run(e){
var spin=document.getElementById('spin-'+e.id),box=document.getElementById('resp-'+e.id),st=document.getElementById('st-'+e.id);
spin.classList.add('spinning');box.classList.remove('visible','error');st.textContent='';
var path=e.path;e.p.forEach(function(p){path=path.replace('{'+p.n+'}',document.getElementById('i-'+e.id+'-'+p.n).value)});
var t0=performance.now();
try{
var r=await fetch(path,{cache:'no-store'}),ms=Math.round(performance.now()-t0);
var ct=r.headers.get('content-type')||'',body=ct.includes('json')?JSON.stringify(await r.json(),null,2):await r.text();
box.textContent=body||'(empty)';box.classList.add('visible');if(!r.ok)box.classList.add('error');
st.innerHTML='<span class="status-ok">'+r.status+' '+ms+'ms</span>';
}catch(ex){
box.textContent='Error: '+(ex.message||ex);box.classList.add('visible','error');
st.innerHTML='<span class="status-err">FAIL</span>';
}finally{spin.classList.remove('spinning')}
}

grid.addEventListener('click',function(e){var b=e.target.closest('[data-run]');if(!b)return;var ep=EPS.find(function(x){return x.id===b.dataset.run});if(ep)run(ep)});

// WebSocket
var ws=null;
function wlog(m,c){var e=document.querySelector('#wsLog .ws-log-empty');if(e)e.remove();var d=document.createElement('div');d.style.marginBottom='3px';d.style.fontSize='11px';d.innerHTML='<span style="color:var(--muted)">'+new Date().toLocaleTimeString('pt-PT')+'</span> '+(c?'<span style="color:'+c+'">'+m+'</span>':'<span>'+m+'</span>');document.getElementById('wsLog').appendChild(d);document.getElementById('wsLog').scrollTop=document.getElementById('wsLog').scrollHeight}
document.getElementById('wsConnect').onclick=function(){
if(ws)return;var id=document.getElementById('wsGameId').value.trim();if(!id)return;
var url=(location.protocol==='https:'?'wss://':'ws://')+location.host+'/ws/game/'+id;
ws=new WebSocket(url);wlog('Connecting...','var(--muted)');
ws.onopen=function(){wlog('Connected','var(--green)');document.getElementById('wsConnect').disabled=true;document.getElementById('wsDisconnect').disabled=false};
ws.onmessage=function(e){wlog(e.data)};
ws.onclose=function(e){wlog('Closed ('+e.code+')','var(--muted)');document.getElementById('wsConnect').disabled=false;document.getElementById('wsDisconnect').disabled=true;ws=null};
ws.onerror=function(){wlog('Error','var(--red)')};
};
document.getElementById('wsDisconnect').onclick=function(){if(ws)ws.close()};
document.getElementById('wsClear').onclick=function(){document.getElementById('wsLog').innerHTML='<div class="ws-log-empty">Enter Game ID and click Connect</div>'};

// Theme
var theme=localStorage.getItem('bounce-theme')||'dark';document.documentElement.setAttribute('data-theme',theme);
updateIcon(theme);
document.getElementById('themeToggle').onclick=function(){var t=document.documentElement.getAttribute('data-theme')==='dark'?'light':'dark';document.documentElement.setAttribute('data-theme',t);localStorage.setItem('bounce-theme',t);updateIcon(t)};
function updateIcon(t){document.getElementById('themeToggle').innerHTML=t==='dark'?'<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>':'<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>'}
</script>
</body>
</html>
