<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Bounce — Test Suite</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#fafafa;color:#333;padding:24px;max-width:800px;margin:0 auto}
h1{font-size:22px;font-weight:600;margin-bottom:4px;color:#222}
.sub{font-size:13px;color:#888;margin-bottom:20px}
.group{margin-bottom:20px}
.group h2{font-size:14px;font-weight:600;margin-bottom:8px;color:#555;text-transform:uppercase;letter-spacing:.5px}
.row{display:flex;align-items:center;gap:8px;padding:8px 12px;background:#fff;border:1px solid #e0e0e0;border-radius:6px;margin-bottom:4px}
.method{font-size:10px;font-weight:700;padding:2px 6px;border-radius:3px;min-width:36px;text-align:center}
.get{background:#61affe;color:#fff}
.url{font-family:monospace;font-size:12px;flex:1;color:#333}
input{border:1px solid #ddd;border-radius:4px;padding:4px 8px;font-size:11px;width:80px}
button{background:#49cc90;color:#fff;border:none;padding:5px 12px;border-radius:4px;cursor:pointer;font-size:11px;font-weight:600}
button:hover{opacity:.85}
.status{font-size:11px;min-width:50px;text-align:right}
.ok{color:#49cc90}.err{color:#f93e3e}.load{color:#aaa}
.result{display:none;background:#263238;color:#e0e0e0;padding:8px 12px;border-radius:6px;margin:-2px 0 8px 0;font-size:11px;font-family:monospace;max-height:150px;overflow:auto;white-space:pre-wrap}
.result.show{display:block}
#run-all{margin-bottom:16px;background:#333;padding:8px 20px;font-size:13px}
.pass{color:#49cc90}.fail{color:#f93e3e}
</style>
</head>
<body>
<h1>Bounce Test Suite</h1>
<p class="sub">Verifies every endpoint from <a href="/docs" style="color:#61affe">/docs</a></p>
<button id="run-all" onclick="runAll()">Run All</button>

<div class="group" id="groups"></div>

<script>
const endpoints = [
  {method:'GET',path:'/health',group:'Admin'},
  {method:'GET',path:'/metrics',group:'Admin'},
  {method:'GET',path:'/api/competitions',group:'Competitions'},
  {method:'GET',path:'/api/standings/10902',group:'Competitions'},
  {method:'GET',path:'/api/game/413420',group:'Games'},
  {method:'GET',path:'/api/games?club=119&season=2025/2026',group:'Games'},
  {method:'GET',path:'/api/games/today',group:'Games'},
  {method:'GET',path:'/api/games/live',group:'Games'},
  {method:'GET',path:'/api/games/paginated?club=119&limit=5',group:'Games'},
  {method:'GET',path:'/api/athlete/269564',group:'Athletes'},
  {method:'GET',path:'/api/club/127/teams',group:'Clubs'},
  {method:'GET',path:'/api/tugabasket/standings?competitionId=1',group:'TugaBasket'},
  {method:'GET',path:'/api/tugabasket/players?competitionId=10902',group:'TugaBasket'},
  {method:'GET',path:'/api/tugabasket/teams?competitionId=10902',group:'TugaBasket'},
  {method:'GET',path:'/api/elo',group:'Insights'},
]

const groups={}
endpoints.forEach(e=>{if(!groups[e.group])groups[e.group]=[];groups[e.group].push(e)})

let html=''
for(const[g,eps]of Object.entries(groups)){
  html+=`<h2>${g}</h2>`
  eps.forEach((e,i)=>{
    const id=g.replace(/\s/g,'')+i
    html+=`<div class="row">
      <span class="method get">${e.method}</span>
      <span class="url">${e.path}</span>
      <button onclick="test('${e.path}','${id}')">Test</button>
      <span class="status load" id="s-${id}">—</span>
    </div>
    <div class="result" id="r-${id}"></div>`
  })
}
document.getElementById('groups').innerHTML=html

async function test(path,id){
  const s=document.getElementById('s-'+id),r=document.getElementById('r-'+id)
  s.textContent='...';s.className='status load'
  const t0=Date.now()
  try{
    const res=await fetch(path)
    const ms=Date.now()-t0
    const body=await res.text()
    let json=''
    try{json=JSON.stringify(JSON.parse(body),null,2)}catch(e){json=body}
    if(res.ok){
      s.textContent=ms+'ms';s.className='status ok'
      r.textContent=json.slice(0,1000)
    }else{
      s.textContent=res.status;s.className='status err'
      r.textContent=json
    }
    r.classList.add('show')
  }catch(e){
    s.textContent='ERR';s.className='status err'
    r.textContent=e.message;r.classList.add('show')
  }
}

async function runAll(){
  const ids=[]
  document.querySelectorAll('button:not(#run-all)').forEach(b=>{b.disabled=true;ids.push(b) })
  for(const[g,eps]of Object.entries(groups)){
    for(let i=0;i<eps.length;i++){
      const id=g.replace(/\s/g,'')+i
      await test(eps[i].path,id)
    }
  }
  ids.forEach(b=>b.disabled=false)
}
</script>
</body>
</html>
