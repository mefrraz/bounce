<!DOCTYPE html>
<html lang="pt" data-theme="dark">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Bounce · Test</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{--accent:#ff6b35;--accent-dim:#e85a2a;--data:#4fc3f7;--bg:#09090b;--card:#18181b;--card-hover:#27272a;--border:rgba(255,255,255,0.1);--border-strong:rgba(255,255,255,0.15);--text:#f4f4f5;--muted:#71717a;--muted2:#52525b;--green:#22c55e;--red:#ef4444}
[data-theme="light"]{--accent:#e85a2a;--accent-dim:#cc4f1f;--data:#0284c7;--bg:#fafafa;--card:#fff;--card-hover:#f4f4f5;--border:rgba(0,0,0,0.08);--border-strong:rgba(0,0,0,0.14);--text:#18181b;--muted:#71717a;--muted2:#a1a1aa;--green:#16a34a;--red:#dc2626}
*{box-sizing:border-box;margin:0;padding:0}
html{scrollbar-gutter:stable}html,body{background:var(--bg);color:var(--text);font-family:'Outfit','Segoe UI',sans-serif;min-height:100vh}
body{background-image:radial-gradient(circle at 15% 0%,rgba(255,107,53,0.08) 0%,transparent 45%),radial-gradient(circle at 85% 15%,rgba(79,195,247,0.04) 0%,transparent 40%);background-attachment:fixed}
[data-theme="light"] body{background-image:radial-gradient(circle at 15% 0%,rgba(255,107,53,0.04) 0%,transparent 45%),radial-gradient(circle at 85% 15%,rgba(2,132,199,0.03) 0%,transparent 40%)}

nav.topbar{position:sticky;top:0;z-index:50;display:flex;align-items:center;justify-content:space-between;padding:0 24px;height:64px;background:rgba(9,9,11,0.85);backdrop-filter:blur(14px);border-bottom:1px solid var(--border)}
[data-theme="light"] nav.topbar{background:rgba(250,250,250,0.85)}
.brand{display:flex;align-items:center;gap:10px;font-weight:800;font-size:17px;letter-spacing:-0.02em}
.brand-mark{width:26px;height:26px;border-radius:8px;background:linear-gradient(135deg,var(--accent),var(--accent-dim));display:flex;align-items:center;justify-content:center;flex-shrink:0}
.brand-mark svg{display:block;width:14px;height:14px}
.brand span.dim{color:var(--muted);font-weight:500}
.nav-links{display:flex;align-items:center;gap:4px}
.nav-links a{color:var(--muted);text-decoration:none;font-size:13px;font-weight:600;padding:7px 14px;border-radius:8px;transition:all .18s}
.nav-links a:hover{color:var(--text);background:rgba(128,128,128,0.1)}
.nav-links a.active{color:var(--accent);background:rgba(255,107,53,0.1)}
.nav-right{display:flex;align-items:center;gap:8px}
.toggle-btn{background:none;border:none;cursor:pointer;padding:4px;color:var(--muted);border-radius:6px;transition:all .15s}
.toggle-btn:hover{color:var(--text);background:rgba(128,128,128,0.1)}
.toggle-btn svg{display:block}

main{max-width:760px;margin:0 auto;padding:28px 20px 60px}
.page-head{margin-bottom:24px}
.page-head h1{font-size:22px;font-weight:800;letter-spacing:-0.02em}
.page-head p{color:var(--muted);font-size:13px;margin-top:4px}

/* Accordion groups */
.accordion{background:var(--card);border:1px solid var(--border);border-radius:12px;margin-bottom:10px;overflow:hidden}
.accordion-header{display:flex;align-items:center;justify-content:space-between;padding:14px 18px;cursor:pointer;font-weight:700;font-size:14px;transition:background .15s}
.accordion-header:hover{background:var(--card-hover)}
.accordion-header::after{content:'+';font-size:18px;color:var(--accent);transition:transform .2s}
.accordion.open .accordion-header::after{content:'−';transform:rotate(180deg)}
.accordion-body{display:none;padding:0 18px 10px}
.accordion.open .accordion-body{display:block}

/* Endpoint card */
.endpoint{border:1px solid var(--border);border-radius:10px;padding:14px 16px;margin:8px 0}
.endpoint.get{border-left:3px solid var(--data)}
.endpoint.ws{border-left:3px solid var(--accent)}
.ep-head{display:flex;align-items:center;gap:10px;margin-bottom:8px;flex-wrap:wrap}
.method-badge{font-size:10.5px;font-weight:800;letter-spacing:.03em;padding:3px 8px;border-radius:6px;color:var(--data);background:rgba(79,195,247,0.12);border:1px solid rgba(79,195,247,0.25)}
.method-badge.ws{color:var(--accent);background:rgba(255,107,53,0.12);border-color:rgba(255,107,53,0.25)}
.ep-path{font-family:'Courier New',monospace;font-size:13px;font-weight:700;color:var(--text);word-break:break-all}
.ep-desc{font-size:12px;color:var(--muted);margin-bottom:8px}

.params-row{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:8px}
.param-field{display:flex;flex-direction:column;gap:3px;flex:1 1 100px;min-width:80px}
.param-field label{font-size:10px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.03em}
.param-field input{background:rgba(128,128,128,0.06);border:1px solid var(--border);border-radius:6px;color:var(--text);font-family:'Courier New',monospace;font-size:11px;padding:6px 8px;outline:none;width:100%}
.param-field input:focus{border-color:var(--accent)}

.ep-actions{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.btn{display:inline-flex;align-items:center;gap:5px;border:none;cursor:pointer;font-family:inherit;font-size:11px;font-weight:700;padding:6px 14px;border-radius:8px;transition:all .15s}
.btn-primary{color:#fff;background:var(--accent);box-shadow:0 1px 6px rgba(255,107,53,0.25)}
.btn-primary:hover{background:var(--accent-dim)}
.btn-danger{color:var(--red);background:transparent;border:1px solid rgba(239,68,68,0.3)}
.btn-danger:hover{background:rgba(239,68,68,0.1)}
.btn-ghost{color:var(--text);background:transparent;border:1px solid var(--border)}
.btn-ghost:hover{background:rgba(128,128,128,0.08)}
.spinner{width:12px;height:12px;border-radius:50%;border:2px solid rgba(128,128,128,0.15);border-top-color:var(--accent);animation:spin .7s linear infinite;display:none;flex-shrink:0}
.spinner.spinning{display:inline-block}@keyframes spin{to{transform:rotate(360deg)}}
pre.resp-box{background:rgba(0,0,0,0.3);border:1px solid var(--border);border-radius:8px;padding:10px 12px;font-family:'Courier New',monospace;font-size:11px;line-height:1.5;max-height:260px;overflow:auto;white-space:pre-wrap;word-break:break-word;display:none;margin-top:8px}
pre.resp-box.visible{display:block}
pre.resp-box.error{color:var(--red);border-color:rgba(239,68,68,0.25)}
.status-badge{font-size:11px;font-weight:700;display:inline-flex;align-items:center;gap:4px}
.status-ok{color:var(--green)}
.status-err{color:var(--red)}

/* WebSocket section */
.ws-section{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:18px;margin-top:10px}
.ws-section h3{font-size:15px;font-weight:700;margin-bottom:14px;display:flex;align-items:center;gap:8px}
.ws-controls{display:flex;align-items:flex-end;gap:8px;flex-wrap:wrap;margin-bottom:14px}
.ws-log{background:rgba(0,0,0,0.3);border:1px solid var(--border);border-radius:8px;padding:10px 12px;height:180px;overflow-y:auto;font-family:'Courier New',monospace;font-size:11px;line-height:1.6}
.ws-log-empty{color:var(--muted);text-align:center;padding-top:70px}

@media(max-width:620px){nav.topbar{padding:0 14px;height:52px}.nav-links a{padding:6px 10px;font-size:12px}.brand span.dim{display:none}main{padding:20px 14px 50px}.params-row{flex-direction:column}}
</style>
</head>
<body>
<nav class="topbar">
<div class="brand">
<div class="brand-mark"><svg viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,0.9)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M4.8 4.8c1.6 2.4 4.8 4 7.2 4s5.6-1.6 7.2-4"/><path d="M4.8 19.2c1.6-2.4 4.8-4 7.2-4s5.6 1.6 7.2 4"/><line x1="12" y1="2" x2="12" y2="22"/></svg></div>
Bounce <span class="dim">/ test</span>
</div>
<div class="nav-links">
<a href="/dashboard">Dashboard</a>
<a href="/docs">API Docs</a>
<a href="/test" class="active">Test</a>
<a href="/metrics">Metrics</a>
</div>
<div class="nav-right">
<button class="toggle-btn" id="themeToggle" title="Alternar modo claro/escuro"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg></button>
</div>
</nav>

<main>
<div class="page-head"><h1>API Test</h1><p>Testa cada endpoint directamente a partir do browser</p></div>

<div class="accordion open" id="group-games">
<div class="accordion-header">Games & Competitions</div>
<div class="accordion-body" id="body-games"></div>
</div>

<div class="accordion open" id="group-standings">
<div class="accordion-header">Standings & Teams</div>
<div class="accordion-body" id="body-standings"></div>
</div>

<div class="accordion" id="group-athletes">
<div class="accordion-header">Athletes & Clubs</div>
<div class="accordion-body" id="body-athletes"></div>
</div>

<div class="accordion" id="group-insights">
<div class="accordion-header">ELO & Insights</div>
<div class="accordion-body" id="body-insights"></div>
</div>

<div class="accordion" id="group-tugabasket">
<div class="accordion-header">TugaBasket</div>
<div class="accordion-body" id="body-tugabasket"></div>
</div>

<div class="accordion" id="group-meta">
<div class="accordion-header">Meta & Health</div>
<div class="accordion-body" id="body-meta"></div>
</div>

<div class="ws-section">
<h3><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="color:var(--accent)"><circle cx="12" cy="12" r="10"/><polyline points="8 12 11 15 16 9"/></svg> WebSocket /ws/game/{id}</h3>
<div class="ws-controls">
<div class="param-field" style="flex:0 0 140px"><label>Game ID</label><input id="wsGameId" value="413420"></div>
<button class="btn btn-primary" id="wsConnect">Connect</button>
<button class="btn btn-danger" id="wsDisconnect" disabled>Disconnect</button>
<button class="btn btn-ghost" id="wsClear" style="font-size:10px">Clear</button>
</div>
<div class="ws-log" id="wsLog"><div class="ws-log-empty">Introduz o Game ID e clica Connect</div></div>
</div>
</main>

<script>
(function(){
// Endpoint definitions grouped by category
var GROUPS=[
{group:'games',endpoints:[
{id:'health',path:'/health',desc:'Health check do servidor',params:[]},
{id:'competitions',path:'/api/competitions',desc:'Lista todas as competições disponíveis',params:[]},
{id:'games',path:'/api/games',desc:'Jogos de um clube por época',params:[{n:'club',v:'119'},{n:'season',v:'2025/2026'}]},
{id:'games-today',path:'/api/games/today',desc:'Jogos agendados para hoje',params:[]},
{id:'games-live',path:'/api/games/live',desc:'Jogos a decorrer neste momento',params:[]},
{id:'game',path:'/api/game/{id}',desc:'Detalhe completo de um jogo',params:[{n:'id',v:'413420'}]},
]},
{group:'standings',endpoints:[
{id:'standings',path:'/api/standings/{id}',desc:'Classificação de uma competição',params:[{n:'id',v:'10902'}]},
{id:'team',path:'/api/team/{id}',desc:'Detalhe de uma equipa',params:[{n:'id',v:'equipa_57682'}]},
]},
{group:'athletes',endpoints:[
{id:'athlete',path:'/api/athlete/{id}',desc:'Perfil e estatísticas de um atleta',params:[{n:'id',v:'269564'}]},
{id:'club-teams',path:'/api/club/{id}/teams',desc:'Equipas de um clube',params:[{n:'id',v:'127'}]},
]},
{group:'insights',endpoints:[
{id:'elo',path:'/api/elo',desc:'Ranking ELO de todas as equipas',params:[]},
{id:'predictions',path:'/api/predictions/{gameId}',desc:'Previsão de vencedor baseada em ELO',params:[{n:'gameId',v:'413420'}]},
{id:'h2h',path:'/api/h2h',desc:'Histórico de confrontos directos',params:[{n:'team_a',v:'127'},{n:'team_b',v:'120'}]},
]},
{group:'tugabasket',endpoints:[
{id:'tb-standings',path:'/api/tugabasket/standings',desc:'Classificação via TugaBasket',params:[{n:'competitionId',v:'1'}]},
{id:'tb-players',path:'/api/tugabasket/players',desc:'Estatísticas de jogadores (TugaBasket)',params:[{n:'competitionId',v:'1'}]},
{id:'tb-teams',path:'/api/tugabasket/teams',desc:'Estatísticas de equipas (TugaBasket)',params:[{n:'competitionId',v:'1'}]},
]},
{group:'meta',endpoints:[
{id:'metrics-hist',path:'/api/metrics/history/simple',desc:'Histórico de métricas para o dashboard',params:[{n:'minutes',v:'60'}]},
]},
];

// Build endpoint cards into their group bodies
GROUPS.forEach(function(g){
var body=document.getElementById('body-'+g.group);
g.endpoints.forEach(function(e){
var card=document.createElement('div');card.className='endpoint get';
var paramsHTML='';
if(e.params.length>0){
paramsHTML='<div class="params-row">'+e.params.map(function(p){return'<div class="param-field"><label>'+p.n+'</label><input id="i-'+e.id+'-'+p.n+'" value="'+p.v+'"></div>'}).join('')+'</div>';
}
card.innerHTML='<div class="ep-head"><span class="method-badge">GET</span><span class="ep-path">'+e.path+'</span></div>'+(e.desc?'<div class="ep-desc">'+e.desc+'</div>':'')+paramsHTML+'<div class="ep-actions"><button class="btn btn-primary" data-run="'+e.id+'">Test</button><span class="spinner" id="spin-'+e.id+'"></span><span id="st-'+e.id+'"></span></div><pre class="resp-box" id="resp-'+e.id+'"></pre>';
body.appendChild(card);
});
});

// Build flat list for lookup
var EPS=[];GROUPS.forEach(function(g){g.endpoints.forEach(function(e){EPS.push(e)})});

async function run(e){
var spin=document.getElementById('spin-'+e.id),box=document.getElementById('resp-'+e.id),st=document.getElementById('st-'+e.id);
spin.classList.add('spinning');box.classList.remove('visible','error');st.textContent='';
var path=e.path;e.params.forEach(function(p){path=path.replace('{'+p.n+'}',document.getElementById('i-'+e.id+'-'+p.n).value)});
var t0=performance.now();
try{
var r=await fetch(path,{cache:'no-store'}),ms=Math.round(performance.now()-t0);
var ct=r.headers.get('content-type')||'',body=ct.includes('json')?JSON.stringify(await r.json(),null,2):await r.text();
box.textContent=body||'(empty)';box.classList.add('visible');if(!r.ok)box.classList.add('error');
st.innerHTML='<span class="status-badge status-ok">'+r.status+' · '+ms+'ms</span>';
}catch(ex){
box.textContent='Error: '+(ex.message||ex);box.classList.add('visible','error');
st.innerHTML='<span class="status-badge status-err">FAIL</span>';
}finally{spin.classList.remove('spinning')}
}

// Click delegation for all Test buttons
document.addEventListener('click',function(e){var b=e.target.closest('[data-run]');if(!b)return;var ep=EPS.find(function(x){return x.id===b.dataset.run});if(ep)run(ep)});

// Accordion toggles
document.querySelectorAll('.accordion-header').forEach(function(h){h.addEventListener('click',function(){this.parentElement.classList.toggle('open')})});

// ── WebSocket ──
var ws=null;
function wlog(m,c){
var empty=document.querySelector('#wsLog .ws-log-empty');if(empty)empty.remove();
var d=document.createElement('div');d.style.marginBottom='3px';d.style.fontSize='11px';
d.innerHTML='<span style="color:var(--muted2)">'+new Date().toLocaleTimeString('pt-PT')+'</span> '+(c?'<span style="color:'+c+'">'+m+'</span>':'<span>'+m+'</span>');
document.getElementById('wsLog').appendChild(d);document.getElementById('wsLog').scrollTop=document.getElementById('wsLog').scrollHeight
}
document.getElementById('wsConnect').onclick=function(){
if(ws)return;var id=document.getElementById('wsGameId').value.trim();if(!id)return;
var url=(location.protocol==='https:'?'wss://':'ws://')+location.host+'/ws/game/'+id;
ws=new WebSocket(url);wlog('Connecting...','var(--muted)');
ws.onopen=function(){wlog('Connected','var(--green)');document.getElementById('wsConnect').disabled=true;document.getElementById('wsDisconnect').disabled=false};
ws.onmessage=function(e){wlog(e.data)};
ws.onclose=function(e){wlog('Closed ('+e.code+')','var(--muted)');document.getElementById('wsConnect').disabled=false;document.getElementById('wsDisconnect').disabled=true;ws=null};
ws.onerror=function(){wlog('Error','var(--red)')};
};
document.getElementById('wsDisconnect').onclick=function(){if(ws)ws.close()};
document.getElementById('wsClear').onclick=function(){document.getElementById('wsLog').innerHTML='<div class="ws-log-empty">Introduz o Game ID e clica Connect</div>'};

// ── Theme ──
var theme=localStorage.getItem('bounce-theme')||'dark';document.documentElement.setAttribute('data-theme',theme);
updateToggleIcon(theme);
function updateToggleIcon(t){document.getElementById('themeToggle').innerHTML=t==='dark'?'<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>':'<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>'}
document.getElementById('themeToggle').onclick=function(){var t=document.documentElement.getAttribute('data-theme')==='dark'?'light':'dark';document.documentElement.setAttribute('data-theme',t);localStorage.setItem('bounce-theme',t);updateToggleIcon(t)};
})();
</script>
</body>
</html>
