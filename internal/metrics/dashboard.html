<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><meta http-equiv="refresh" content="10">
<title>Bounce — Dashboard</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#0f0f1a;color:#e0e0e0;padding:20px;max-width:600px;margin:0 auto}
h1{font-size:20px;color:#ff6b35;margin-bottom:4px}
.sub{font-size:12px;color:#888;margin-bottom:16px}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.card{background:#1a1a2e;border-radius:8px;padding:14px;text-align:center}
.card .label{font-size:11px;color:#888;text-transform:uppercase;letter-spacing:.5px}
.card .value{font-size:28px;font-weight:700;color:#4fc3f7;margin-top:4px}
.card .unit{font-size:11px;color:#666}
.live{color:#4caf50;animation:pulse 2s infinite}@keyframes pulse{50%{opacity:.5}}
</style>
</head>
<body>
<h1>Bounce Dashboard</h1>
<p class="sub">Auto-refresh 10s · <span class="live">● Live</span></p>
<div class="grid" id="cards"></div>
<script>
const metrics={uptime_seconds:'Uptime',goroutines:'Goroutines',memory_bytes:'Memory',requests_total:'Requests',cache_hits_total:'Cache Hits',cache_misses_total:'Cache Misses',fpb_requests_total:'FPB Requests',rate_limited_total:'Rate Limited'}
async function update(){
 try{
  const r=await fetch('/metrics'),t=await r.text()
  const data={}
  t.split('\n').forEach(l=>{const m=l.match(/^bounce_(\w+)\s+(\d+)/);if(m)data[m[1]]=parseInt(m[2])})
  let html=''
  for(const[key,label]of Object.entries(metrics)){
   const v=data[key]||0
   let unit='',display=v
   if(key==='memory_bytes'){display=(v/1048576).toFixed(1);unit='MB'}
   if(key==='uptime_seconds'){const m=Math.floor(v/60),s=v%60;display=m+':'+String(s).padStart(2,'0');unit='min'}
   html+=`<div class="card"><div class="label">${label}</div><div class="value">${display}</div><div class="unit">${unit}</div></div>`
  }
  document.getElementById('cards').innerHTML=html
 }catch(e){}
}
update();setInterval(update,10000)
</script>
</body>
</html>
