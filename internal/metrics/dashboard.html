<!DOCTYPE html>
<html lang="pt" data-theme="dark">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Bounce · Dashboard</title>
<style>
:root{--accent:#ff6b35;--accent-dim:#e85a2a;--data:#4fc3f7;--bg:#09090b;--card:#18181b;--border:rgba(255,255,255,0.1);--border-strong:rgba(255,255,255,0.15);--text:#f4f4f5;--muted:#71717a;--muted2:#52525b;--green:#22c55e;--red:#ef4444}
[data-theme="light"]{--accent:#e85a2a;--data:#0284c7;--bg:#fafafa;--card:#fff;--border:rgba(0,0,0,0.08);--border-strong:rgba(0,0,0,0.14);--text:#18181b;--muted:#71717a;--muted2:#a1a1aa;--green:#16a34a;--red:#dc2626}
*{box-sizing:border-box;margin:0;padding:0}
html{scrollbar-gutter:stable}
html,body{background:var(--bg);color:var(--text);font-family:system-ui,-apple-system,sans-serif;min-height:100vh}
body{background-image:radial-gradient(circle at 15% 0%,rgba(255,107,53,0.08) 0%,transparent 45%),radial-gradient(circle at 85% 15%,rgba(79,195,247,0.04) 0%,transparent 40%);background-attachment:fixed}
nav.topbar{position:sticky;top:0;z-index:50;display:flex;align-items:center;justify-content:space-between;padding:0 24px;height:64px;background:rgba(9,9,11,0.85);backdrop-filter:blur(14px);border-bottom:1px solid var(--border)}
[data-theme="light"] nav.topbar{background:rgba(250,250,250,0.85)}
.brand{display:flex;align-items:center;gap:10px;font-weight:600;font-size:17px}
.brand-mark{width:26px;height:26px;border-radius:8px;background:var(--accent);border:2px dashed rgba(255,255,255,0.3);display:flex;align-items:center;justify-content:center;font-size:10px;color:rgba(255,255,255,0.5)}
.brand span.dim{color:var(--muted);font-weight:500}
.nav-links{display:flex;align-items:center;gap:4px}
.nav-links a{color:var(--muted);text-decoration:none;font-size:13px;font-weight:600;padding:7px 14px;border-radius:8px;transition:all .15s}
.nav-links a:hover{color:var(--text);background:rgba(128,128,128,0.1)}
.nav-links a.active{color:var(--accent);background:rgba(255,107,53,0.1)}
.nav-right{display:flex;align-items:center;gap:8px}
.toggle-btn{background:none;border:none;cursor:pointer;padding:4px;color:var(--muted);border-radius:6px}
.toggle-btn:hover{color:var(--text)}
.toggle-btn svg{display:block}
.live-pill{font-size:11px;font-weight:600;display:flex;align-items:center;gap:5px;padding:5px 10px;border-radius:999px}
.live-pill.online{color:var(--green);background:rgba(34,197,94,0.1);border:1px solid rgba(34,197,94,0.2)}
.live-pill.offline{color:var(--red);background:rgba(239,68,68,0.1);border:1px solid rgba(239,68,68,0.2)}
.live-pill .dot{width:6px;height:6px;border-radius:50%;background:currentColor}
.live-pill.online .dot{animation:pulse 1.6s infinite}@keyframes pulse{50%{opacity:.5}}
main{max-width:1180px;margin:0 auto;padding:28px 20px 60px}
.page-head{margin-bottom:22px}
.page-head h1{font-size:22px;font-weight:600}
.page-head p{color:var(--muted);font-size:13px;margin-top:2px}
.range-bar{display:inline-flex;align-items:center;gap:2px;background:var(--card);border:1px solid var(--border);border-radius:999px;padding:4px}
.range-btn{border:none;background:transparent;cursor:pointer;color:var(--muted);font-family:inherit;font-size:12px;font-weight:600;padding:6px 14px;border-radius:999px;transition:all .15s}
.range-btn:hover{color:var(--text)}
.range-btn.active{color:#fff;background:var(--accent)}
.toolbar{display:flex;align-items:center;flex-wrap:wrap;gap:12px;margin-bottom:22px}
.metrics-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:24px}
.metric-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:16px}
.metric-label{font-size:11px;font-weight:600;text-transform:uppercase;color:var(--muted);margin-bottom:8px}
.metric-value{font-size:28px;font-weight:600;line-height:1}
.metric-sub{margin-top:6px;font-size:11px;color:var(--muted2)}
.charts-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}
.chart-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:16px}
.chart-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.chart-title{font-size:12px;font-weight:600;color:var(--text);display:flex;align-items:center;gap:6px}
.chart-title .dot{width:6px;height:6px;border-radius:50%}
.chart-current{font-size:12px;font-weight:600;color:var(--muted)}
canvas.chart-canvas{width:100%;height:140px;display:block}
@media(max-width:880px){.metrics-grid{grid-template-columns:repeat(2,1fr)}.charts-grid{grid-template-columns:1fr}}
@media(max-width:620px){nav.topbar{padding:0 14px;height:52px}.nav-links a{padding:6px 10px;font-size:12px}.brand span.dim{display:none}main{padding:20px 14px 50px}.metric-value{font-size:24px}.range-bar{width:100%;justify-content:space-between}.range-btn{flex:1;padding:6px 4px}}
@media(max-width:420px){.metrics-grid{grid-template-columns:1fr}}
</style>
</head>
<body>
<nav class="topbar">
<div class="brand"><div class="brand-mark" title="Logo">?</div>Bounce <span class="dim">/ dashboard</span></div>
<div class="nav-links">
<a href="/dashboard" class="active">Dashboard</a><a href="/docs">API Docs</a><a href="/test">Test</a><a href="/metrics">Metrics</a>
</div>
<div class="nav-right">
<span class="live-pill online" id="livePill"><span class="dot"></span>Live</span>
<button class="toggle-btn" id="themeToggle" title="Light/Dark"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg></button>
</div>
</nav>
<main>
<div class="page-head"><h1>Server Metrics</h1><p>Proxy de dados desportivos — basquetebol português</p></div>
<div class="toolbar"><div class="range-bar" id="rangeBar">
<button class="range-btn active" data-minutes="5">5m</button><button class="range-btn" data-minutes="60">1h</button><button class="range-btn" data-minutes="360">6h</button><button class="range-btn" data-minutes="1440">24h</button><button class="range-btn" data-minutes="10080">7d</button>
</div></div>
<section class="metrics-grid">
<div class="metric-card"><div class="metric-label">Requests</div><div class="metric-value" id="mRequests">-</div><div class="metric-sub" id="mRequestsSub"></div></div>
<div class="metric-card"><div class="metric-label">Cache Hits</div><div class="metric-value" id="mCache">-</div><div class="metric-sub" id="mCacheSub"></div></div>
<div class="metric-card"><div class="metric-label">FPB Requests</div><div class="metric-value" id="mFpb">-</div><div class="metric-sub" id="mFpbSub"></div></div>
<div class="metric-card"><div class="metric-label">Rate Limited</div><div class="metric-value" id="mLimited">-</div><div class="metric-sub" id="mLimitedSub"></div></div>
</section>
<section class="charts-grid">
<div class="chart-card"><div class="chart-head"><div class="chart-title"><span class="dot" style="background:var(--accent)"></span>Requests / min</div><div class="chart-current" id="crv">-</div></div><canvas class="chart-canvas" id="c1"></canvas></div>
<div class="chart-card"><div class="chart-head"><div class="chart-title"><span class="dot" style="background:var(--data)"></span>Cache Hit Rate %</div><div class="chart-current" id="ccv">-</div></div><canvas class="chart-canvas" id="c2"></canvas></div>
<div class="chart-card"><div class="chart-head"><div class="chart-title"><span class="dot" style="background:var(--green)"></span>FPB Requests</div><div class="chart-current" id="cfv">-</div></div><canvas class="chart-canvas" id="c3"></canvas></div>
</section>
</main>
<script>
(function(){
var cm=5,rt=null,isf=!1;
function $(id){return document.getElementById(id)}

function draw(canvas,series,color){
var ctx=canvas.getContext('2d'),dpr=window.devicePixelRatio||1,r=canvas.getBoundingClientRect(),w=Math.max(r.width,260),h=140;
if(w<10||h<10)return;
canvas.width=w*dpr;canvas.height=h*dpr;canvas.style.width=w+'px';canvas.style.height=h+'px';ctx.setTransform(dpr,0,0,dpr,0,0);ctx.clearRect(0,0,w,h);
if(!series||!series.length)return;
var p={top:8,right:8,bottom:16,left:30},cw=w-p.left-p.right,ch=h-p.top-p.bottom;
var vs=series.map(function(v){return v.value}),max=Math.max.apply(Math,vs),min=Math.min.apply(Math,vs);
if(max===min){max=min+1}
var rng=max-min;
ctx.strokeStyle=getComputedStyle(document.body).getPropertyValue('--muted2');ctx.lineWidth=1;
for(var i=0;i<=3;i++){var y=p.top+(ch/3)*i;ctx.beginPath();ctx.moveTo(p.left,y);ctx.lineTo(w-p.right,y);ctx.stroke()}
var sx=series.length>1?cw/(series.length-1):0;
var g=ctx.createLinearGradient(0,p.top,0,p.top+ch);g.addColorStop(0,color+'44');g.addColorStop(1,color+'00');
ctx.beginPath();ctx.moveTo(p.left,p.top+ch-((series[0].value-min)/rng)*ch);
for(var j=1;j<series.length;j++){ctx.lineTo(p.left+sx*j,p.top+ch-((series[j].value-min)/rng)*ch)}
ctx.lineTo(p.left+sx*(series.length-1),p.top+ch);ctx.lineTo(p.left,p.top+ch);ctx.closePath();ctx.fillStyle=g;ctx.fill();
ctx.beginPath();ctx.moveTo(p.left,p.top+ch-((series[0].value-min)/rng)*ch);
for(var k=1;k<series.length;k++){ctx.lineTo(p.left+sx*k,p.top+ch-((series[k].value-min)/rng)*ch)}
ctx.strokeStyle=color;ctx.lineWidth=2;ctx.lineJoin='round';ctx.stroke()
}

function fmt(n){if(n===null||n===undefined||isNaN(n))return'-';return Number(n).toLocaleString('pt-PT')}

async function fetch(){
if(isf)return;isf=!0;
try{
var r=await fetch('/api/metrics/history/simple?minutes='+cm,{cache:'no-store'});if(!r.ok)throw Error('HTTP '+r.status);
var snaps=await r.json();if(!Array.isArray(snaps))snaps=snaps.history||snaps.data||snaps.snapshots||[];
snaps=snaps.map(function(s){return{req:Number(s.requests||0),ch:Number(s.cache_hits||0),cm:Number(s.cache_misses||0),fp:Number(s.fpb_requests||0),rl:Number(s.rate_limited||0)}});
if(!snaps.length)return;
var last=snaps[snaps.length-1],prev=snaps.length>1?snaps[snaps.length-2]:null;
var hr=last.ch+last.cm>0?Math.round(last.ch/(last.ch+last.cm)*100):0;
$('mRequests').textContent=fmt(last.req);$('mRequestsSub').textContent=prev?((last.req-prev.req)>0?'+':'')+(last.req-prev.req):'';
$('mCache').textContent=hr+'%';$('mCacheSub').textContent=fmt(last.ch)+' / '+fmt(last.ch+last.cm);
$('mFpb').textContent=fmt(last.fp);$('mFpbSub').textContent=prev?((last.fp-prev.fp)>0?'+':'')+(last.fp-prev.fp):'';
$('mLimited').textContent=fmt(last.rl);$('mLimitedSub').textContent=prev?((last.rl-prev.rl)>0?'+':'')+(last.rl-prev.rl):'';
var rs=snaps.map(function(s,i){return{value:i>0?Math.max(0,s.req-(snaps[i-1]||s).req):0}});
var cs=snaps.map(function(s){var t=s.ch+s.cm;return{value:t>0?Math.round(s.ch/t*100):0}});
var fs=snaps.map(function(s,i){return{value:i>0?Math.max(0,s.fp-(snaps[i-1]||s).fp):0}});
draw($('c1'),rs,'#ff6b35');draw($('c2'),cs,'#4fc3f7');draw($('c3'),fs,'#22c55e');
$('crv').textContent=last?fmt(last.req):'-';$('ccv').textContent=last?hr+'%':'-';$('cfv').textContent=last?fmt(last.fp):'-';
$('livePill').className='live-pill online';$('livePill').innerHTML='<span class="dot"></span>Live';
}catch(e){$('livePill').className='live-pill offline';$('livePill').innerHTML='<span class="dot"></span>Offline'}
isf=!1}

$('rangeBar').addEventListener('click',function(e){var b=e.target.closest('.range-btn');if(!b)return;document.querySelectorAll('#rangeBar .range-btn').forEach(function(x){x.classList.remove('active')});b.classList.add('active');cm=Number(b.dataset.minutes);fetch()});

var theme=localStorage.getItem('bounce-theme')||'dark';document.documentElement.setAttribute('data-theme',theme);
setIcon(theme);
function setIcon(t){$('themeToggle').innerHTML=t==='dark'?'<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>':'<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>'}
$('themeToggle').addEventListener('click',function(){var t=document.documentElement.getAttribute('data-theme')==='dark'?'light':'dark';document.documentElement.setAttribute('data-theme',t);localStorage.setItem('bounce-theme',t);setIcon(t);fetch()});

var ws=null;
function cn(){try{ws=new WebSocket((location.protocol==='https:'?'wss://':'ws://')+location.host+'/ws/dashboard');ws.onopen=function(){$('livePill').className='live-pill online';$('livePill').innerHTML='<span class="dot"></span>Live'};ws.onmessage=function(e){try{var d=JSON.parse(e.data);$('mRequests').textContent=fmt(d.requests||0);$('mFpb').textContent=fmt(d.fpb_requests||0);$('mLimited').textContent=fmt(d.rate_limited||0);var hr=d.cache_hits+d.cache_misses>0?Math.round(d.cache_hits/(d.cache_hits+d.cache_misses)*100):0;$('mCache').textContent=hr+'%'}catch(ex){}};ws.onclose=function(){setTimeout(cn,3000)};ws.onerror=function(){ws.close()}}catch(ex){}}
cn();
fetch();rt=setInterval(fetch,10000);
window.addEventListener('resize',fetch);
})();
</script>
</body>
</html>
