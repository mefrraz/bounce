services:
  bounce:
    image: ghcr.io/mefrraz/bounce:latest
    container_name: bounce
    restart: unless-stopped
    ports:
      - "3001:3001"
      # - "80:80"    # uncomment for TLS
      # - "443:443"  # uncomment for TLS
    environment:
      - BOUNCE_DATA_DIR=/data
      # Uncomment and set your own values:
      # - BOUNCE_TRUSTED_ORIGINS=example.com
      # - BOUNCE_RATE_LIMIT=500
      # - BOUNCE_TLS_DOMAIN=api.example.com
      # - BOUNCE_TLS_CACHE=/data/autocert
      # - BOUNCE_QUIET=true
      # - DRIBLY_KEY=your-secret-key
    volumes:
      - bounce-data:/data
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3001/health"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 5s

volumes:
  bounce-data:
