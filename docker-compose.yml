services:
  bounce:
    build: .
    image: ghcr.io/mefrraz/bounce:latest
    container_name: bounce
    restart: unless-stopped
    ports:
      - "3001:3001"
      # - "80:80"    # uncomment for TLS
      # - "443:443"  # uncomment for TLS
    environment:
      - BOUNCE_DATA_DIR=/data
      # - BOUNCE_TLS_DOMAIN=bounce.dribly.pt      # uncomment for HTTPS
      # - BOUNCE_TLS_CACHE=/data/autocert          # uncomment for HTTPS
      # - BOUNCE_QUIET=true
      # - BOUNCE_RATE_LIMIT=500
    volumes:
      - bounce-data:/data
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3001/health"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 5s

volumes:
  bounce-data:
